{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm mt-4">
            <div class="card-header bg-white">
                <h4 class="mb-0">Create New Project</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('projects.create') }}">
                    <div class="mb-3">
                        <label for="title" class="form-label">Project Title</label>
                        <input type="text" class="form-control" id="title" name="title" required placeholder="e.g., Code Gen Eval Model A vs Model B">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description (Optional)</label>
                        <textarea class="form-control" id="description" name="description" rows="3" placeholder="Briefly describe what this project evaluates..."></textarea>
                    </div>
                    <div class="mb-4">
                        <label for="evaluator_id" class="form-label">Assign Evaluator (Optional)</label>
                        <select class="form-select" id="evaluator_id" name="evaluator_id">
                            <option value="">-- Leave Unassigned --</option>
                            {% for evaluator in evaluators %}
                            <option value="{{ evaluator.id }}">{{ evaluator.username }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('projects.index') }}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Create Project</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
